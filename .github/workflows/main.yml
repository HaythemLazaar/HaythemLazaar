name: DevCard

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  devcard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: devcard
        uses: dailydotdev/action-devcard@892dbef7cb9419b045744afa1120dfbf3014c857 # 2.0.2
        with:
          devcard_id: ${{ secrets.DEVCARD_ID }}
